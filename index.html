<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign-up Form</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="header">
      <div class="header__logo">
        <img class="logo" src="img/odin-lined.png" alt="Odin logo" />
        <h1 class="header__title">ODIN</h1>
      </div>
      <div class="header__footer">
        <div class="credit">
          <p class="credit__text">
            Photo by <a href="https://unsplash.com/@haliewestphoto" target="_blank" class="credit__author">Halie west</a> on
            <a href="https://unsplash.com/photos/green-leaf-plant-in-close-up-photography-25xggax4bSA" target="_blank" class="credit__source">Unsplash</a>
          </p>
        </div>
      </div>
    </div>

    <div class="main">
        <div class="main__header">
            <div class="header__first">
                <p class="aa">This is not a real online service! You Know you need something like this in your life to help you realize your deepest dreams.</p>
                <p>Sign up now to get started.</p>
                <p class="header__tagline">You <em>Know</em> you want to.</em></p>
            </div>
        </div>
        <div class="main-content">
            <h2 class="form-heading">Let's do this!</h2>
            <form class="form" action="#" method="post">
              <div class="form-column">
                <label for="first-name">FIRST NAME</label>
                <input type="text" id="first-name" name="first-name">
                
                <label for="email">Email</label>
                <input type="email" id="email" name="email">
                
                <label for="password">PASSWORD</label>
                <input type="password" name="password id="password>
              </div>
              <div class="form-column">
                
                <label for="last-name">LAST NAME</label>
                <input type="text" id="last-name" name="last-name">
                
                <label for="phone-number">PHONE NUMBER</label>
                <input type="tel" id="phone-number" name="phone-number">

                <label for="confirm-password">CONFIRM PASSWORD</label>
                <input type="password" name="confirm-password id="confirm-password>
              </div>
              <div class="form-column"></div>
            </form>
        </div>
        <div class="main__footer">
            <button class="footer__btn">Create Account</button>
            <p class="footer__text">Already have an account? <span class="footer__login">Log in</span></p>
        </div>
    </div>
  </body>
</html>
